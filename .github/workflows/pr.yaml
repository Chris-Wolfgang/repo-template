# Sequential PR validation workflow with coverage gating
# Stage 1: Linux tests with 90% coverage requirement
# Stage 2: Windows .NET (5.0-10.0) and .NET Framework (4.6.2-4.8.1) tests (only if Linux passes)
# Stage 3: macOS tests (only if Stage 2 passes)
#
# SECURITY NOTE:
# - Uses pull_request_target to run workflow from the trusted main branch, not from the PR branch
# - This prevents malicious workflow YAML changes in untrusted PR branches from taking effect
# - All checkout steps use PR refs (refs/pull/*/head) to check out PR code from the base repo
# - persist-credentials: false prevents the checkout token from being written to git config for subsequent git commands
#   (it does NOT, by itself, prevent steps from accessing github.token / GITHUB_TOKEN if you explicitly expose it)
# - Default GITHUB_TOKEN permissions are restricted to read-only repository contents to limit impact if exposed

name: PR Checks v3 (Gated)

permissions:
  contents: read

env:
  CODECOV_MINIMUM: 90
  
on:
  pull_request_target:  # Runs from the main branch, not from PR branch
    branches:
      - main
jobs:
  # ============================================================================
  # DETECTION: Check if .csproj files exist
  # ============================================================================
  detect-projects:
    name: "Detect .NET Projects"
    runs-on: ubuntu-latest
    if: github.repository != 'Chris-Wolfgang/repo-template'
    outputs:
      has-projects: ${{ steps.check-projects.outputs.has-projects }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          persist-credentials: false
      
      - name: Check for .NET project files
        id: check-projects
        run: |
          if git ls-files '*.csproj' '*.vbproj' '*.fsproj' | grep -q .; then
            echo "has-projects=true" >> $GITHUB_OUTPUT
            echo "✅ Found .NET project files - .NET build and test jobs will run"
          else
            echo "has-projects=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No .NET project files found - skipping .NET build and test jobs"
          fi

  # ============================================================================
  # STAGE 1: Linux - .NET Core/5+ Tests with Coverage Gate
  # ============================================================================
  test-linux-core: 
    name: "Stage 1: Linux Tests (.NET 5.0-10.0) + Coverage Gate"
    runs-on:  ubuntu-latest
    needs: detect-projects
    if: github.repository != 'Chris-Wolfgang/repo-template' && needs.detect-projects.outputs.has-projects == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          persist-credentials: false

      # Fix for .NET 5.0 on Ubuntu 22.04+ - install libssl1.1 from the focal-security
      # repository so APT verifies the package via GPG instead of a plain wget download.
      - name: Install OpenSSL 1.1 for .NET 5.0
        run: |
          echo "deb http://security.ubuntu.com/ubuntu focal-security main" | sudo tee /etc/apt/sources.list.d/focal-security.list
          sudo apt-get update -q
          sudo apt-get install --yes libssl1.1
          sudo rm /etc/apt/sources.list.d/focal-security.list

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            5.0.x
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Restore and build (exclude .NET Framework-only projects)
        shell: pwsh
        run: |
          Write-Host "Finding .NET project files in repository..."

          $allProjects = @(Get-ChildItem -Path '.' -Recurse -File -Include '*.csproj','*.vbproj','*.fsproj')

          if ($allProjects.Count -eq 0) {
            Write-Error "❌ No .NET projects found."
            exit 1
          }

          # Filter out projects that ONLY target .NET Framework 4.x
          # Multi-targeting projects (e.g., net8.0;net48) will be INCLUDED
          # Use XML parsing + MSBuild fallback so multi-line values are handled correctly.
          $projects = @()
          foreach ($proj in $allProjects) {
            $frameworkValue = $null

            # Try XML parsing first
            try {
              [xml]$projectXml = Get-Content $proj.FullName
              foreach ($propGroup in $projectXml.Project.PropertyGroup) {
                if ($propGroup.TargetFrameworks) { $frameworkValue = $propGroup.TargetFrameworks; break }
                elseif ($propGroup.TargetFramework) { $frameworkValue = $propGroup.TargetFramework; break }
              }
            } catch {
              Write-Warning "Failed to parse $($proj.Name) as XML: $_"
            }

            # Fall back to MSBuild if not found in XML
            if (-not $frameworkValue) {
              foreach ($prop in @("TargetFrameworks", "TargetFramework")) {
                $result = dotnet msbuild $proj.FullName /nologo "-getProperty:$prop" 2>&1
                if ($LASTEXITCODE -eq 0 -and $result) {
                  foreach ($line in $result) {
                    if ($line -match '^\s*TargetFrameworks?\s*[:=]\s*(.+)$') {
                      $frameworkValue = $Matches[1].Trim()
                      break
                    }
                  }
                }
                if ($frameworkValue) { break }
              }
            }

            # Check if any framework is .NET 5+ or .NET Core / .NET Standard
            $isCompatible = $false
            if ($frameworkValue) {
              $fws = $frameworkValue -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
              $isCompatible = ($fws | Where-Object { $_ -match '^(net([5-9]|[1-9][0-9]+)\.|netcoreapp|netstandard)' }).Count -gt 0
            }

            if ($isCompatible) {
              $projects += $proj
              Write-Host "✓ Including: $($proj.FullName) (has .NET 5+ or .NET Core target)"
            } else {
              Write-Host "⊘ Excluding: $($proj.FullName) (Framework-only, incompatible with Linux)"
            }
          }

          if ($projects.Count -eq 0) {
            Write-Error "❌ No compatible .NET projects found. All projects target only .NET Framework 4.x, which is incompatible with Linux."
            exit 1
          }

          Write-Host ""
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host "Projects to build:" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          $projects | ForEach-Object { Write-Host $_.FullName }
          Write-Host ""

          # Restore each project
          Write-Host "Restoring projects..."
          foreach ($proj in $projects) {
            Write-Host "Restoring: $($proj.FullName)"
            dotnet restore $proj.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          Write-Host ""
          Write-Host "Building projects..."
          # Build each project, handling multi-targeting projects
          # For multi-targeting projects, build only Linux-compatible frameworks (.NET 5.0+, .NET Core, .NET Standard)
          foreach ($proj in $projects) {
            Write-Host "Building: $($proj.FullName)"

            # Parse project XML to get target frameworks
            $targetFramework = $null
            $targetFrameworks = $null
            try {
              [xml]$projectXml = Get-Content $proj.FullName
              foreach ($propGroup in $projectXml.Project.PropertyGroup) {
                if ($propGroup.TargetFrameworks) { $targetFrameworks = $propGroup.TargetFrameworks; break }
                elseif ($propGroup.TargetFramework) { $targetFramework = $propGroup.TargetFramework; break }
              }
            } catch {
              Write-Warning "Failed to re-parse $($proj.Name) as XML: $_"
            }

            $allFrameworks = @()
            if ($targetFrameworks) {
              $allFrameworks = $targetFrameworks -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
            } elseif ($targetFramework) {
              $allFrameworks = @($targetFramework.Trim()) | Where-Object { $_ }
            } else {
              # MSBuild fallback
              foreach ($prop in @("TargetFrameworks", "TargetFramework")) {
                $result = dotnet msbuild $proj.FullName /nologo "-getProperty:$prop" 2>&1
                if ($LASTEXITCODE -eq 0 -and $result) {
                  foreach ($line in $result) {
                    if ($line -match '^\s*TargetFrameworks\s*[:=]\s*(.+)$') {
                      $allFrameworks = $Matches[1].Trim() -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
                      break
                    } elseif ($line -match '^\s*TargetFramework\s*[:=]\s*(.+)$') {
                      $v = $Matches[1].Trim()
                      if ($v) { $allFrameworks = @($v) }
                      if ($allFrameworks.Count -gt 0) { break }
                    }
                  }
                }
                if ($allFrameworks.Count -gt 0) { break }
              }
            }

            # Filter to Linux-compatible frameworks
            $compatibleFrameworks = @($allFrameworks | Where-Object { $_ -match '^(net([5-9]|[1-9][0-9]+)\.|netcoreapp[0-9.]+|netstandard[0-9.]+)' })

            if ($compatibleFrameworks.Count -eq 0) {
              Write-Warning "⚠️  No Linux-compatible frameworks found in $($proj.Name)"
              continue
            }

            if ($compatibleFrameworks.Count -eq 1) {
              Write-Host "  Target framework: $($compatibleFrameworks[0])"
              dotnet build $proj.FullName --no-restore --configuration Release
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            } else {
              Write-Host "  Target frameworks (multi-targeting): $($compatibleFrameworks -join ' ')"
              foreach ($fw in $compatibleFrameworks) {
                Write-Host "  Building framework: $fw"
                dotnet build $proj.FullName --no-restore --configuration Release --framework $fw
                if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
              }
            }
          }

          Write-Host ""
          Write-Host "✅ All compatible projects built successfully" -ForegroundColor Green

      - name: Run tests with coverage (.NET Core 5.0 - 10.0)
        shell: pwsh
        run: |
          $testProjects = @(Get-ChildItem -Path './tests' -Recurse -File -Include '*.csproj','*.vbproj','*.fsproj')

          if ($testProjects.Count -eq 0) {
            Write-Error "❌ No test projects found in ./tests directory!"
            exit 1
          }

          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host "Found test projects:" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          $testProjects | ForEach-Object { Write-Host $_.FullName }
          Write-Host ""

          foreach ($testProj in $testProjects) {
            Write-Host "==========================================" -ForegroundColor Cyan
            Write-Host "Testing project: $($testProj.Name)" -ForegroundColor Cyan
            Write-Host "==========================================" -ForegroundColor Cyan

            # Parse the project XML to robustly extract TargetFramework(s),
            # including multi-line values that grep-based approaches can miss.
            try {
              [xml]$projectXml = Get-Content $testProj.FullName
            } catch {
              Write-Error "❌ Failed to parse project file $($testProj.Name): $_"
              exit 1
            }

            # Search all PropertyGroup elements for TargetFramework(s)
            $targetFramework = $null
            $targetFrameworks = $null
            foreach ($propGroup in $projectXml.Project.PropertyGroup) {
              if ($propGroup.TargetFrameworks) {
                $targetFrameworks = $propGroup.TargetFrameworks
                break
              } elseif ($propGroup.TargetFramework) {
                $targetFramework = $propGroup.TargetFramework
                break
              }
            }

            # Determine which frameworks this project targets
            $frameworks = @()
            if ($targetFrameworks) {
              $frameworks = $targetFrameworks -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
            } elseif ($targetFramework) {
              $frameworks = @($targetFramework.Trim()) | Where-Object { $_ }
            } else {
              # No TargetFramework found directly; fall back to MSBuild evaluation
              # (handles Directory.Build.props and other imported property files)
              Write-Host "No TargetFramework or TargetFrameworks found in $($testProj.Name); querying MSBuild..." -ForegroundColor Yellow

              $msbuildExitCode = 0
              $msbuildOutput = @()
              foreach ($prop in @("TargetFrameworks", "TargetFramework")) {
                $result = dotnet msbuild $testProj.FullName /nologo "-getProperty:$prop" 2>&1
                if ($LASTEXITCODE -ne 0) { $msbuildExitCode = $LASTEXITCODE }
                if ($result) { $msbuildOutput += $result }
              }

              if ($msbuildExitCode -ne 0) {
                Write-Warning "MSBuild query failed for $($testProj.Name). Tests will run without explicit --framework."
                $frameworks = @('')
              } else {
                $resolvedFrameworks = @()
                foreach ($line in $msbuildOutput) {
                  if ([string]::IsNullOrWhiteSpace($line)) { continue }
                  if ($line -match '^\s*TargetFrameworks\s*[:=]\s*(.+)$') {
                    $resolvedFrameworks = $Matches[1].Trim() -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
                    break
                  } elseif ($line -match '^\s*TargetFramework\s*[:=]\s*(.+)$') {
                    $propertyValue = $Matches[1].Trim()
                    if ($propertyValue) { $resolvedFrameworks = @($propertyValue) }
                    if ($resolvedFrameworks.Count -gt 0) { break }
                  }
                }

                if ($resolvedFrameworks.Count -gt 0) {
                  $frameworks = $resolvedFrameworks
                } else {
                  Write-Warning "MSBuild query returned no target frameworks for $($testProj.Name). Tests will run without explicit --framework."
                  $frameworks = @('')
                }
              }
            }

            # Filter to .NET 5.0+ frameworks only (Linux-compatible)
            $compatibleFrameworks = $frameworks | Where-Object { $_ -match '^net([5-9]|[1-9][0-9]+)\.' }

            if ($compatibleFrameworks.Count -eq 0) {
              Write-Host "⊘ Skipping: No compatible .NET 5.0-10.0 target frameworks found" -ForegroundColor Yellow
              Write-Host ""
              continue
            }

            Write-Host "Target frameworks: $($compatibleFrameworks -join ' ')"
            Write-Host ""

            foreach ($fw in $compatibleFrameworks) {
              Write-Host "Testing framework: $fw" -ForegroundColor Yellow

              dotnet test $testProj.FullName `
                --configuration Release `
                --framework $fw `
                --collect:"XPlat Code Coverage" `
                --results-directory "./TestResults" `
                --logger "console;verbosity=minimal"

              if ($LASTEXITCODE -ne 0) {
                Write-Error "❌ Tests failed for framework $fw in $($testProj.Name)"
                exit $LASTEXITCODE
              }
            }
            Write-Host ""
          }

      - name: Check for coverage files
        id: check-coverage
        run: |
          if find TestResults -type f -name "coverage.cobertura.xml" 2>/dev/null | grep -q .; then
            echo "has-coverage=true" >> $GITHUB_OUTPUT
            echo "✅ Coverage files found"
          else
            echo "has-coverage=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No coverage files found - skipping coverage report generation"
          fi

      - name: Install ReportGenerator
        if: steps.check-coverage.outputs.has-coverage == 'true'
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        if: steps.check-coverage.outputs.has-coverage == 'true'
        run: |
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:"CoverageReport" \
            -reporttypes:"Html;TextSummary;MarkdownSummaryGithub;CsvSummary"

      - name: Enforce 90% coverage threshold
        if: steps.check-coverage.outputs.has-coverage == 'true'
        run: |
          if [ ! -f CoverageReport/Summary.txt ]; then
            echo "❌ Coverage report not generated!"
            exit 1
          fi

          echo "Coverage Summary:"
          cat CoverageReport/Summary.txt
          echo ""
          
          failed_projects=""
          threshold=${CODECOV_MINIMUM:-90}
          
          while read -r line; do
            # Match lines with module names and percentages
            if echo "$line" | grep -qE '^[^ ].*[0-9]+%$' && ! echo "$line" | grep -q '^Summary'; then
              module=$(echo "$line" | awk '{print $1}')
              percent=$(echo "$line" | awk '{print $NF}' | tr -d '%')
              
              echo "Checking module: '$module' - Coverage: ${percent}%"
              
              if [ "$percent" -lt "$threshold" ]; then
                echo "  ❌ FAIL: Below ${threshold}% threshold"
                failed_projects="$failed_projects $module (${percent}%)"
              else
                echo "  ✅ PASS: Meets ${threshold}% threshold"
              fi
            fi
          done < CoverageReport/Summary.txt

          if [ -n "$failed_projects" ]; then
            echo ""
            echo "=========================================="
            echo "❌ COVERAGE GATE FAILED"
            echo "=========================================="
            echo "Projects below ${threshold}% coverage: $failed_projects"
            echo ""
            echo "Stage 1 failed. Windows, macOS, and .NET Framework tests will NOT run."
            exit 1
          else
            echo ""
            echo "=========================================="
            echo "✅ COVERAGE GATE PASSED"
            echo "=========================================="
            echo "All projects meet ${threshold}% coverage threshold."
            echo "Proceeding to Stage 2 (Windows and macOS tests)."
          fi

      - name: Upload Linux coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-linux
          path: |
            TestResults/
            CoverageReport/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            src/**/bin/Release
            tests/**/bin/Release

  # ============================================================================
  # STAGE 2: Windows - All .NET Tests (Gated by Stage 1)
  # ============================================================================
  test-windows:
    name: "Stage 2: Windows Tests (.NET 5.0-10.0, Framework 4.6.2-4.8.1)"
    runs-on: windows-latest
    needs: [detect-projects, test-linux-core]
    if: github.repository != 'Chris-Wolfgang/repo-template' && needs.detect-projects.outputs.has-projects == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            5.0.x
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run all .NET tests (.NET 5.0-10.0 and Framework 4.6.2-4.8.1)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          
          $testProjects = @(Get-ChildItem -Path './tests/*' -Recurse -File -Include '*.csproj','*.vbproj','*.fsproj')
          
          if (@($testProjects).Count -eq 0) {
            Write-Error "❌ No test projects found in ./tests directory!"
            exit 1
          }
          
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host "Found test projects:" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          $testProjects | ForEach-Object { Write-Host $_.FullName -ForegroundColor White }
          Write-Host ""
          
          foreach ($testProj in $testProjects) {
            Write-Host "==========================================" -ForegroundColor Cyan
            Write-Host "Testing project: $($testProj.FullName)" -ForegroundColor Cyan
            Write-Host "==========================================" -ForegroundColor Cyan
            
            # Extract target frameworks from the project file
            # Support both <TargetFramework> (single) and <TargetFrameworks> (multiple)
            $content = Get-Content $testProj.FullName -Raw
            $tfmMatch = [regex]::Match($content, '<TargetFramework[s]?>([^<]+)</TargetFramework[s]?>')
            
            if (-not $tfmMatch.Success) {
              Write-Host "⊘ Skipping: No target frameworks found" -ForegroundColor Yellow
              Write-Host ""
              continue
            }
            
            # Split by semicolon for multi-targeting projects
            $frameworks = $tfmMatch.Groups[1].Value -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ -match '^net(5\.0|6\.0|7\.0|8\.0|9\.0|10\.0|462|47|471|472|48|481)$' }
            
            if ($frameworks.Count -eq 0) {
              Write-Host "⊘ Skipping: No compatible .NET 5.0-10.0 or Framework 4.6.2-4.8.1 target frameworks found" -ForegroundColor Yellow
              Write-Host ""
              continue
            }
            
            Write-Host "Target frameworks: $($frameworks -join ', ')" -ForegroundColor White
            Write-Host ""
            
            # Test each framework that the project actually targets
            foreach ($fw in $frameworks) {
              Write-Host "Testing framework: $fw" -ForegroundColor Yellow
              
              dotnet test $testProj.FullName `
                --configuration Release `
                --framework $fw `
                --logger "console;verbosity=normal"
              
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Tests failed for $fw in $($testProj.Name)"
                exit 1
              }
            }
            Write-Host ""
          }

  # ============================================================================
  # STAGE 3: macOS Tests (Gated by Stage 2)
  # ============================================================================
  test-macos-core:
    name: "Stage 3: macOS Tests (.NET 6.0-10.0)"
    runs-on: macos-latest
    needs: [detect-projects, test-windows]
    if: github.repository != 'Chris-Wolfgang/repo-template' && needs.detect-projects.outputs.has-projects == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Restore and build (exclude .NET Framework-only projects)
        shell: pwsh
        run: |
          Write-Host "Finding .NET project files in repository..."

          $allProjects = @(Get-ChildItem -Path '.' -Recurse -File -Include '*.csproj','*.vbproj','*.fsproj')

          if ($allProjects.Count -eq 0) {
            Write-Error "❌ No .NET projects found."
            exit 1
          }

          # Filter out projects that ONLY target .NET Framework 4.x or lack .NET 6+
          # Multi-targeting projects (e.g., net8.0;net48) will be INCLUDED
          # Use XML parsing + MSBuild fallback so multi-line values are handled correctly.
          $projects = @()
          foreach ($proj in $allProjects) {
            $frameworkValue = $null

            # Try XML parsing first
            try {
              [xml]$projectXml = Get-Content $proj.FullName
              foreach ($propGroup in $projectXml.Project.PropertyGroup) {
                if ($propGroup.TargetFrameworks) { $frameworkValue = $propGroup.TargetFrameworks; break }
                elseif ($propGroup.TargetFramework) { $frameworkValue = $propGroup.TargetFramework; break }
              }
            } catch {
              Write-Warning "Failed to parse $($proj.Name) as XML: $_"
            }

            # Fall back to MSBuild if not found in XML
            if (-not $frameworkValue) {
              foreach ($prop in @("TargetFrameworks", "TargetFramework")) {
                $result = dotnet msbuild $proj.FullName /nologo "-getProperty:$prop" 2>&1
                if ($LASTEXITCODE -eq 0 -and $result) {
                  foreach ($line in $result) {
                    if ($line -match '^\s*TargetFrameworks?\s*[:=]\s*(.+)$') {
                      $frameworkValue = $Matches[1].Trim()
                      break
                    }
                  }
                }
                if ($frameworkValue) { break }
              }
            }

            # Check if any framework is .NET 6+ (macOS ARM64 compatible)
            $isCompatible = $false
            if ($frameworkValue) {
              $fws = $frameworkValue -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
              $isCompatible = ($fws | Where-Object { $_ -match '^net([6-9]|[1-9][0-9]+)\.' }).Count -gt 0
            }

            if ($isCompatible) {
              $projects += $proj
              Write-Host "✓ Including: $($proj.FullName) (has .NET 6+ target)"
            } else {
              Write-Host "⊘ Excluding: $($proj.FullName) (no .NET 6+ target, incompatible with macOS ARM64)"
            }
          }

          if ($projects.Count -eq 0) {
            Write-Error "❌ No compatible .NET projects found. All projects lack .NET 6+ targets, which are required for macOS ARM64."
            exit 1
          }

          Write-Host ""
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host "Projects to build (excluding .NET Framework-only projects):" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          $projects | ForEach-Object { Write-Host $_.FullName }
          Write-Host ""

          # Restore each project
          Write-Host "Restoring projects..."
          foreach ($proj in $projects) {
            Write-Host "Restoring: $($proj.FullName)"
            dotnet restore $proj.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          Write-Host ""
          Write-Host "Building projects..."
          # Build each project, handling multi-targeting projects
          # For multi-targeting projects, build only macOS ARM64-compatible frameworks (net6.0-10.0)
          foreach ($proj in $projects) {
            Write-Host "Building: $($proj.FullName)"

            # Parse project XML to get target frameworks
            $targetFramework = $null
            $targetFrameworks = $null
            try {
              [xml]$projectXml = Get-Content $proj.FullName
              foreach ($propGroup in $projectXml.Project.PropertyGroup) {
                if ($propGroup.TargetFrameworks) { $targetFrameworks = $propGroup.TargetFrameworks; break }
                elseif ($propGroup.TargetFramework) { $targetFramework = $propGroup.TargetFramework; break }
              }
            } catch {
              Write-Warning "Failed to re-parse $($proj.Name) as XML: $_"
            }

            $allFrameworks = @()
            if ($targetFrameworks) {
              $allFrameworks = $targetFrameworks -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
            } elseif ($targetFramework) {
              $allFrameworks = @($targetFramework.Trim()) | Where-Object { $_ }
            } else {
              # MSBuild fallback
              foreach ($prop in @("TargetFrameworks", "TargetFramework")) {
                $result = dotnet msbuild $proj.FullName /nologo "-getProperty:$prop" 2>&1
                if ($LASTEXITCODE -eq 0 -and $result) {
                  foreach ($line in $result) {
                    if ($line -match '^\s*TargetFrameworks\s*[:=]\s*(.+)$') {
                      $allFrameworks = $Matches[1].Trim() -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
                      break
                    } elseif ($line -match '^\s*TargetFramework\s*[:=]\s*(.+)$') {
                      $v = $Matches[1].Trim()
                      if ($v) { $allFrameworks = @($v) }
                      if ($allFrameworks.Count -gt 0) { break }
                    }
                  }
                }
                if ($allFrameworks.Count -gt 0) { break }
              }
            }

            # Filter to macOS ARM64-compatible frameworks
            $compatibleFrameworks = @($allFrameworks | Where-Object { $_ -match '^net([6-9]|[1-9][0-9]+)\.' })

            if ($compatibleFrameworks.Count -eq 0) {
              Write-Warning "⚠️  No macOS ARM64-compatible frameworks found in $($proj.Name)"
              continue
            }

            if ($compatibleFrameworks.Count -eq 1) {
              Write-Host "  Target framework: $($compatibleFrameworks[0])"
              dotnet build $proj.FullName --no-restore --configuration Release
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            } else {
              Write-Host "  Target frameworks (multi-targeting): $($compatibleFrameworks -join ' ')"
              foreach ($fw in $compatibleFrameworks) {
                Write-Host "  Building framework: $fw"
                dotnet build $proj.FullName --no-restore --configuration Release --framework $fw
                if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
              }
            }
          }

          Write-Host ""
          Write-Host "✅ All compatible projects built successfully" -ForegroundColor Green

      - name:  Run tests (.NET 6.0 - 10.0 only - ARM64 compatible)
        shell: pwsh
        run: |
          $testProjects = @(Get-ChildItem -Path './tests' -Recurse -File -Include '*.csproj','*.vbproj','*.fsproj')

          if ($testProjects.Count -eq 0) {
            Write-Error "❌ No test projects found in ./tests directory!"
            exit 1
          }

          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host "Found test projects:" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          $testProjects | ForEach-Object { Write-Host $_.FullName }
          Write-Host ""

          foreach ($testProj in $testProjects) {
            Write-Host "==========================================" -ForegroundColor Cyan
            Write-Host "Testing project: $($testProj.Name)" -ForegroundColor Cyan
            Write-Host "==========================================" -ForegroundColor Cyan

            # Parse the project XML to robustly extract TargetFramework(s),
            # including multi-line values that grep-based approaches can miss.
            try {
              [xml]$projectXml = Get-Content $testProj.FullName
            } catch {
              Write-Error "❌ Failed to parse project file $($testProj.Name): $_"
              exit 1
            }

            # Search all PropertyGroup elements for TargetFramework(s)
            $targetFramework = $null
            $targetFrameworks = $null
            foreach ($propGroup in $projectXml.Project.PropertyGroup) {
              if ($propGroup.TargetFrameworks) {
                $targetFrameworks = $propGroup.TargetFrameworks
                break
              } elseif ($propGroup.TargetFramework) {
                $targetFramework = $propGroup.TargetFramework
                break
              }
            }

            # Determine which frameworks this project targets
            $frameworks = @()
            if ($targetFrameworks) {
              $frameworks = $targetFrameworks -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
            } elseif ($targetFramework) {
              $frameworks = @($targetFramework.Trim()) | Where-Object { $_ }
            } else {
              # No TargetFramework found directly; fall back to MSBuild evaluation
              # (handles Directory.Build.props and other imported property files)
              Write-Host "No TargetFramework or TargetFrameworks found in $($testProj.Name); querying MSBuild..." -ForegroundColor Yellow

              $msbuildExitCode = 0
              $msbuildOutput = @()
              foreach ($prop in @("TargetFrameworks", "TargetFramework")) {
                $result = dotnet msbuild $testProj.FullName /nologo "-getProperty:$prop" 2>&1
                if ($LASTEXITCODE -ne 0) { $msbuildExitCode = $LASTEXITCODE }
                if ($result) { $msbuildOutput += $result }
              }

              if ($msbuildExitCode -ne 0) {
                Write-Warning "MSBuild query failed for $($testProj.Name). Tests will run without explicit --framework."
                $frameworks = @('')
              } else {
                $resolvedFrameworks = @()
                foreach ($line in $msbuildOutput) {
                  if ([string]::IsNullOrWhiteSpace($line)) { continue }
                  if ($line -match '^\s*TargetFrameworks\s*[:=]\s*(.+)$') {
                    $resolvedFrameworks = $Matches[1].Trim() -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
                    break
                  } elseif ($line -match '^\s*TargetFramework\s*[:=]\s*(.+)$') {
                    $propertyValue = $Matches[1].Trim()
                    if ($propertyValue) { $resolvedFrameworks = @($propertyValue) }
                    if ($resolvedFrameworks.Count -gt 0) { break }
                  }
                }

                if ($resolvedFrameworks.Count -gt 0) {
                  $frameworks = $resolvedFrameworks
                } else {
                  Write-Warning "MSBuild query returned no target frameworks for $($testProj.Name). Tests will run without explicit --framework."
                  $frameworks = @('')
                }
              }
            }

            # Filter to .NET 6.0+ frameworks only (ARM64 compatible on macOS)
            $compatibleFrameworks = $frameworks | Where-Object { $_ -match '^net([6-9]|[1-9][0-9]+)\.' }

            if ($compatibleFrameworks.Count -eq 0) {
              Write-Host "⊘ Skipping: No compatible .NET 6.0-10.0 target frameworks found (ARM64 required)" -ForegroundColor Yellow
              Write-Host ""
              continue
            }

            Write-Host "Target frameworks: $($compatibleFrameworks -join ' ')"
            Write-Host ""

            foreach ($fw in $compatibleFrameworks) {
              Write-Host "Testing framework: $fw" -ForegroundColor Yellow

              dotnet test $testProj.FullName `
                --configuration Release `
                --framework $fw `
                --logger "console;verbosity=normal"

              if ($LASTEXITCODE -ne 0) {
                Write-Error "❌ Tests failed for framework $fw in $($testProj.Name)"
                exit $LASTEXITCODE
              }
            }
            Write-Host ""
          }

      - name: Display macOS architecture info
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "ℹ️  macOS Testing Notes"
          echo "=========================================="
          echo "Architecture: $(uname -m)"
          echo ""
          echo "Skipped frameworks (no ARM64 support):"
          echo "  - .NET 5.0 ❌"
          echo ""
          echo "Tested frameworks (ARM64 compatible):"
          echo "  - .NET 6.0 ✅"
          echo "  - .NET 7.0 ✅"
          echo "  - .NET 8.0 ✅"
          echo "  - .NET 9.0 ✅"
          echo "  - .NET 10.0 ✅"
          echo ""
          echo ".NET Core 5.0 are tested on Linux and Windows"
          echo ""

      - name: Summarize pipeline result
        run: |
          echo "=========================================="
          echo "✅ ALL STAGES PASSED"
          echo "=========================================="
          echo "Stage 1: Linux tests + 90% coverage ✅"
          echo "Stage 2: Windows .NET Core & .NET Framework tests ✅"
          echo "Stage 3: macOS tests ✅"
          echo ""
          echo "PR is ready to merge! 🎉"

  # ============================================================================
  # Security Scan (Runs in parallel, independently of .NET jobs)
  # ============================================================================
  security-scan:
    name: "Security Scan (DevSkim)"
    runs-on: ubuntu-latest
    if: github.repository != 'Chris-Wolfgang/repo-template'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          persist-credentials: false

      - name: Install DevSkim CLI
        run: dotnet tool install --global Microsoft.CST.DevSkim.CLI

      - name: Run DevSkim security scan
        run: |
          devskim analyze \
            --source-code . \
            --file-format text \
            --output-file devskim-results.txt \
            --ignore-rule-ids DS176209 \
            --ignore-globs "**/api/**,**/CoverageReport/**,**/TestResults/**"

      - name: Display security scan results
        if: always()
        run: |
          if [ -f devskim-results.txt ]; then
            echo "=========================================="
            echo "DevSkim Security Scan Results"
            echo "=========================================="
            cat devskim-results.txt
            echo ""
            
            if grep -qi "error\|critical\|high" devskim-results.txt; then
              echo "❌ Security issues detected - review required"
              exit 1
            else
              echo "✅ No critical security issues found"
            fi
          else
            echo "✅ No security issues found"
          fi

      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devskim-results
          path: devskim-results.txt
          if-no-files-found: warn
